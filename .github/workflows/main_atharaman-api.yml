name: Build and deploy PHP app to Azure Web App - atharaman-api

on:
  push:
    branches:
      - main
  workflow_dispatch:

# 1. This block is CRITICAL for OIDC (the IDs in your screenshot) to work
permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, mysql

      - name: Install dependencies
        run: composer install --ignore-platform-reqs --optimize-autoloader --no-dev

      - name: Zip artifact for deployment
        run: zip release.zip ./* -r

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: php-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'production'

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: php-app

      - name: Unzip artifact for deployment
        run: unzip release.zip

      # 2. Login to Azure using the secrets from your screenshot
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_2189B29FE1704E52B62B175562D3960D }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_23AFD8CBD61049EE873952DF8469521A }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_DF21607C7EF447BDAA9B167B2F13E14B }}

      # 3. Deploy without a publish-profile
      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'atharaman-api'
          package: .
