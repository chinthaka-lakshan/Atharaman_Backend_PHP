name: Build and deploy PHP app to Azure Web App - atharaman-api

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4 # Updated to v4 for Node 24 support

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, mysql

      - name: Check if composer.json exists
        id: check_files
        uses: andstor/file-existence-action@v3 # Updated to v3
        with:
          files: 'composer.json'

      - name: Install dependencies
        if: steps.check_files.outputs.files_exists == 'true'
        run: composer install --ignore-platform-reqs --optimize-autoloader --no-dev

      - name: Zip artifact for deployment
        run: zip release.zip ./* -r

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4 # Updated to v4
        with:
          name: php-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4 # Updated to v4
        with:
          name: php-app

      - name: Unzip artifact for deployment
        run: unzip release.zip

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3 # Updated to v3
        id: deploy-to-webapp
        with:
          app-name: 'atharaman-api' # Ensure this matches your Azure App name
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_XXXXXXXX }} # Don't change the secret name
